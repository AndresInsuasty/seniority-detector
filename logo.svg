<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ef4444"/>
      <stop offset="40%"  stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="slashGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <filter id="glowRed" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card -->
  <rect width="200" height="200" rx="18" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="199" height="199" rx="17.5" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Subtle top accent line -->
  <rect x="60" y="0" width="80" height="2" rx="1" fill="url(#bar)" opacity="0.6"/>

  <!-- < -->
  <text x="16" y="120"
        font-family="'Courier New', Courier, monospace"
        font-size="82" font-weight="700"
        fill="#ef4444"
        filter="url(#glowRed)">&lt;</text>

  <!-- / -->
  <text x="70" y="120"
        font-family="'Courier New', Courier, monospace"
        font-size="82" font-weight="700"
        fill="url(#slashGrad)">/</text>

  <!-- > -->
  <text x="116" y="120"
        font-family="'Courier New', Courier, monospace"
        font-size="82" font-weight="700"
        fill="#22c55e"
        filter="url(#glowGreen)">&gt;</text>

  <!-- Divider -->
  <line x1="24" y1="136" x2="176" y2="136" stroke="#21262d" stroke-width="1"/>

  <!-- Bar track -->
  <rect x="24" y="145" width="152" height="7" rx="3.5" fill="#1f2937"/>
  <!-- Bar fill -->
  <rect x="24" y="145" width="152" height="7" rx="3.5" fill="url(#bar)"/>

  <!-- Labels -->
  <text x="24"  y="164" font-family="'Courier New',monospace" font-size="8.5" fill="#6e7681">junior</text>
  <text x="176" y="164" font-family="'Courier New',monospace" font-size="8.5" fill="#6e7681" text-anchor="end">senior</text>

  <!-- Name -->
  <text x="100" y="184"
        font-family="'Courier New', Courier, monospace"
        font-size="9.5" fill="#3d444d"
        text-anchor="middle" letter-spacing="1.8">seniority-detector</text>
</svg>
